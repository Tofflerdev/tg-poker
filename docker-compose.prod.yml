services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-poker_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poker} -d ${POSTGRES_DB:-poker_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Application (server)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-poker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-poker_db}
      BOT_TOKEN: ${BOT_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      # Playtest bots: set RECORD_SESSIONS=1 in .env to record sessions/*.jsonl
      RECORD_SESSIONS: ${RECORD_SESSIONS:-}
      # crypto-payments-rake phase 4 §D: Crypto Pay deposits. Empty token disables
      # deposits (graceful). Set both in .env; testnet flag hits testnet-pay.crypt.bot.
      CRYPTO_PAY_TOKEN: ${CRYPTO_PAY_TOKEN:-}
      CRYPTO_PAY_TESTNET: ${CRYPTO_PAY_TESTNET:-}
    volumes:
      - client-dist:/app/client-dist
      # Persist playtest session logs + generated reports on the host so they
      # survive container rebuilds and are readable by the oracle/report CLIs.
      - ./sessions:/app/sessions
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Nginx reverse proxy + static files
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client-dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  client-dist:

networks:
  internal:
    driver: bridge
