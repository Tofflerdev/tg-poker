<?xml version="1.0" encoding="UTF-8"?>
<!--
  NightRiver — primary in-app logo (icon + wordmark composite).
  Style: Neon Strip — dark surface, cyan/amber neon accents, soft glow.
  Mark: crescent moon above a curving river (two-stroke horizontal sweep),
        with a stylized spade cut-out in the moon to read as poker-night.
  Wordmark: "NightRiver" — geometric sans, title case, cyan with amber highlight
            on "River" to match the chip-count amber in the game UI.
  Viewbox 512×128, transparent background so it works on dark surfaces.
  See .planning/phases/02-design-system-rollout-avatars/02-03-PLAN.md.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128" width="512" height="128" role="img" aria-label="NightRiver">
  <defs>
    <!-- cyan neon glow filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- amber neon glow filter -->
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- gradient for the river sweep -->
    <linearGradient id="river-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="45%"  stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.15"/>
    </linearGradient>
    <!-- spade silhouette clipped out of the moon -->
    <mask id="moon-mask">
      <rect x="0" y="0" width="128" height="128" fill="white"/>
      <!-- spade cut-out: classic pip silhouette, scaled down -->
      <path d="M 58 46 C 58 38, 50 35, 45 42 C 40 49, 44 56, 50 58 L 52 64 L 64 64 L 66 58 C 72 56, 76 49, 71 42 C 66 35, 58 38, 58 46 Z"
            transform="translate(-2 -2)" fill="black"/>
    </mask>
  </defs>

  <!-- ICON block (0..128) -->
  <g transform="translate(8 8)">
    <!-- Crescent moon: cyan neon outline, spade cut out -->
    <g filter="url(#glow-cyan)">
      <!-- outer ring of crescent: full disc then inner eclipse -->
      <g mask="url(#moon-mask)">
        <!-- full disc -->
        <circle cx="58" cy="48" r="28"
                fill="none" stroke="#00e5ff" stroke-width="3"/>
        <!-- inner "eclipse" arc that carves the crescent -->
        <circle cx="68" cy="44" r="24" fill="#0a0a0e"/>
      </g>
    </g>

    <!-- River sweep: two curving strokes under the moon -->
    <g filter="url(#glow-cyan)">
      <path d="M 4 94 C 28 82, 52 106, 76 94 S 112 82, 116 94"
            fill="none" stroke="url(#river-grad)" stroke-width="3"
            stroke-linecap="round"/>
      <path d="M 4 104 C 28 94, 52 116, 76 104 S 112 94, 116 104"
            fill="none" stroke="url(#river-grad)" stroke-width="2"
            stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- small amber reflection dots on the river (poker-chip echo) -->
    <g filter="url(#glow-amber)">
      <circle cx="34" cy="98"  r="1.6" fill="#ffab00"/>
      <circle cx="60" cy="102" r="1.6" fill="#ffab00"/>
      <circle cx="88" cy="98"  r="1.6" fill="#ffab00"/>
    </g>
  </g>

  <!-- WORDMARK block (140..500) -->
  <g transform="translate(140 0)" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
     font-weight="700" font-size="52" letter-spacing="1.5">
    <!-- "Night" in cyan-tinted off-white -->
    <text x="0" y="80" fill="#e0f7fa" filter="url(#glow-cyan)">Night</text>
    <!-- "River" in amber to echo chip-count glow -->
    <text x="152" y="80" fill="#ffab00" filter="url(#glow-amber)">River</text>
    <!-- thin cyan underline accent bar, mimics the GlowBar pattern -->
    <rect x="0" y="94" width="316" height="2" fill="#00e5ff" opacity="0.55"/>
    <rect x="0" y="94" width="316" height="1" fill="#00e5ff"/>
  </g>
</svg>
